# K9s light terminal theme
k9s:
  body:
    fgColor: "#ffffff"
    bgColor: default
    logoColor: "#5ca6ff"
  prompt:
    fgColor: "#ffffff"
    bgColor: default
    suggestColor: "#aaaaaa"
  info:
    fgColor: "#5ca6ff"
    sectionColor: "#ffffff"
  dialog:
    fgColor: "#ffffff"
    bgColor: default
    buttonFgColor: "#000000"
    buttonBgColor: "#5ca6ff"
    buttonFocusFgColor: "#000000"
    buttonFocusBgColor: "#8ec6ff"
    labelFgColor: "#ffaa44"
  frame:
    border:
      fgColor: "#888888"
      focusColor: "#5ca6ff"
    menu:
      fgColor: "#ffffff"
      keyColor: "#5ca6ff"
      numKeyColor: "#ffaa44"
    crumbs:
      fgColor: "#000000"
      bgColor: "#5ca6ff"
      activeColor: "#8ec6ff"
    status:
      newColor: "#5ca6ff"
      modifyColor: "#ffaa44"
      addColor: "#44dd44"
      pendingColor: "#ffaa44"
      errorColor: "#ff5555"
      highlightColor: "#5ca6ff"
      killColor: "#dd88dd"
      completedColor: "#888888"
    title:
      fgColor: "#ffffff"
      bgColor: default
      highlightColor: "#5ca6ff"
      counterColor: "#ffaa44"
      filterColor: "#44dd44"
  views:
    charts:
      bgColor: default
      defaultDialColors:
        - "#5ca6ff"
        - "#ff5555"
      defaultChartColors:
        - "#5ca6ff"
        - "#ff5555"
    table:
      fgColor: "#ffffff"
      bgColor: default
      cursorFgColor: "#000000"
      cursorBgColor: "#5ca6ff"
      markColor: "#ffaa44"
      header:
        fgColor: "#bbbbbb"
        bgColor: default
        sorterColor: "#ffaa44"
    xray:
      fgColor: "#ffffff"
      bgColor: default
      cursorColor: "#5ca6ff"
      cursorTextColor: "#000000"
      graphicColor: "#888888"
    yaml:
      keyColor: "#5ca6ff"
      colonColor: "#888888"
      valueColor: "#ffffff"
    logs:
      fgColor: "#ffffff"
      bgColor: default
      indicator:
        fgColor: "#000000"
        bgColor: "#5ca6ff"
        toggleOnColor: "#44dd44"
        toggleOffColor: "#888888"
    help:
      fgColor: "#ffffff"
      bgColor: default
      keyColor: "#5ca6ff"
      numKeyColor: "#ffaa44"
      sectionColor: "#ffaa44"
